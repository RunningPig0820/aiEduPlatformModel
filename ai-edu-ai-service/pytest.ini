[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 显示更多信息
addopts = -v --tb=short

# 标记
markers =
    requires_zhipu: 需要 ZHIPU_API_KEY
    requires_deepseek: 需要 DEEPSEEK_API_KEY
    requires_bailian: 需要 DASHSCOPE_API_KEY
    unit: 单元测试
    integration: 集成测试
    real: 真实 API 测试